<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Tape Deck MP3 Player – Preview</title>
<style>
body {
    background: #1a1a1a;
    margin: 0;
    padding: 20px;
    font-family: sans-serif;
}
h1 {
    color: #d4af37;
    text-align: center;
    font-family: "Courier New", monospace;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 0;
}
/* ==========================================================================
   Retro Tape Deck MP3 Player – Early 1990s Dual Cassette Deck
   ========================================================================== */
.rtd-player *,
.rtd-player *::before,
.rtd-player *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

.rtd-player {
    --deck-bg: #3a3a3a;
    --deck-border: #1a1a1a;
    --deck-highlight: #555;
    --deck-shadow: #111;
    --cassette-well: #1e1e1e;
    --reel-hub: #222;
    --reel-spoke: #444;
    --tape-brown: #4a2c0a;
    --led-green: #33ff33;
    --led-red: #ff3333;
    --led-amber: #ffaa00;
    --btn-face: #666;
    --btn-shadow: #333;
    --btn-highlight: #888;
    --label-text: #ccc;
    --lcd-bg: #1a2a10;
    --lcd-text: #33ff33;

    font-family: "Courier New", Courier, monospace;
    max-width: 780px;
    margin: 2rem auto;
    background: var(--deck-bg);
    border: 3px solid var(--deck-border);
    border-radius: 10px;
    padding: 20px 24px 18px;
    box-shadow:
        inset 0 1px 0 var(--deck-highlight),
        0 6px 20px rgba(0, 0, 0, 0.6);
    position: relative;
    user-select: none;
}

.rtd-brand {
    text-align: center;
    margin-bottom: 10px;
}

.rtd-brand-name {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #d4af37;
    text-shadow: 0 1px 2px #000;
}

.rtd-brand-model {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--label-text);
    text-transform: uppercase;
}

.rtd-display {
    background: var(--lcd-bg);
    border: 2px inset #111;
    border-radius: 4px;
    padding: 8px 14px;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 52px;
}

.rtd-display-track {
    color: var(--lcd-text);
    font-size: 13px;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.rtd-display-time {
    color: var(--lcd-text);
    font-size: 18px;
    min-width: 70px;
    text-align: right;
    font-variant-numeric: tabular-nums;
}

.rtd-vu-container {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 12px;
}

.rtd-vu-meter {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 22px;
}

.rtd-vu-meter .vu-bar {
    width: 6px;
    background: var(--led-green);
    border-radius: 1px;
    transition: height 0.08s ease;
    height: 2px;
}

.rtd-vu-meter .vu-bar:nth-child(n+9) {
    background: var(--led-amber);
}

.rtd-vu-meter .vu-bar:nth-child(n+12) {
    background: var(--led-red);
}

.rtd-vu-label {
    font-size: 9px;
    color: var(--label-text);
    text-transform: uppercase;
    letter-spacing: 1px;
    writing-mode: vertical-lr;
    transform: rotate(180deg);
}

.rtd-wells {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
}

.rtd-well {
    flex: 1;
    background: var(--cassette-well);
    border: 2px inset #111;
    border-radius: 6px;
    padding: 14px 10px;
    position: relative;
    min-height: 120px;
}

.rtd-well-label {
    position: absolute;
    top: 4px;
    left: 8px;
    font-size: 9px;
    color: var(--label-text);
    text-transform: uppercase;
    letter-spacing: 2px;
}

.rtd-reels {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding-top: 10px;
}

.rtd-reel {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--reel-hub);
    border: 3px solid #555;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

.rtd-reel-inner {
    width: 18px;
    height: 18px;
    background: #111;
    border-radius: 50%;
    border: 2px solid #444;
}

.rtd-reel::before,
.rtd-reel::after {
    content: "";
    position: absolute;
    width: 2px;
    height: 100%;
    background: var(--reel-spoke);
    left: 50%;
    top: 0;
    transform: translateX(-50%);
}

.rtd-reel::after {
    transform: translateX(-50%) rotate(60deg);
}

.rtd-reel .spoke-3 {
    position: absolute;
    width: 2px;
    height: 100%;
    background: var(--reel-spoke);
    left: 50%;
    top: 0;
    transform: translateX(-50%) rotate(120deg);
}

.rtd-reel.spinning {
    animation: rtd-spin 2s linear infinite;
}

@keyframes rtd-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}

.rtd-tape-strip {
    position: absolute;
    top: 75%;
    left: 20%;
    right: 20%;
    height: 6px;
    background: var(--tape-brown);
    border-radius: 2px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
}

.rtd-controls {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 14px;
}

.rtd-btn {
    width: 48px;
    height: 36px;
    background: linear-gradient(to bottom, var(--btn-highlight), var(--btn-face));
    border: 2px outset var(--btn-highlight);
    border-radius: 3px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ddd;
    font-size: 14px;
    transition: all 0.05s;
    position: relative;
}

.rtd-btn:hover {
    background: linear-gradient(to bottom, #999, #777);
}

.rtd-btn:active,
.rtd-btn.active {
    border-style: inset;
    background: linear-gradient(to bottom, #555, #666);
    padding-top: 2px;
}

.rtd-btn-label {
    position: absolute;
    bottom: -14px;
    font-size: 7px;
    color: var(--label-text);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
}

.rtd-btn-play .icon-play {
    width: 0;
    height: 0;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    border-left: 12px solid #ddd;
    margin-left: 2px;
}

.rtd-btn-pause .icon-pause {
    display: flex;
    gap: 3px;
}

.rtd-btn-pause .icon-pause span {
    width: 4px;
    height: 14px;
    background: #ddd;
    border-radius: 1px;
}

.rtd-btn-stop .icon-stop {
    width: 12px;
    height: 12px;
    background: #ddd;
    border-radius: 1px;
}

.rtd-btn-rew .icon-rew {
    display: flex;
    align-items: center;
}

.rtd-btn-rew .icon-rew span {
    width: 0;
    height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-right: 8px solid #ddd;
}

.rtd-btn-ff .icon-ff {
    display: flex;
    align-items: center;
}

.rtd-btn-ff .icon-ff span {
    width: 0;
    height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 8px solid #ddd;
}

.rtd-btn-prev .icon-prev,
.rtd-btn-next .icon-next {
    display: flex;
    align-items: center;
    gap: 1px;
}

.rtd-btn-prev .icon-prev span:first-child {
    width: 3px;
    height: 12px;
    background: #ddd;
}

.rtd-btn-prev .icon-prev span:last-child {
    width: 0;
    height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-right: 8px solid #ddd;
}

.rtd-btn-next .icon-next span:first-child {
    width: 0;
    height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 8px solid #ddd;
}

.rtd-btn-next .icon-next span:last-child {
    width: 3px;
    height: 12px;
    background: #ddd;
}

.rtd-btn-eject .icon-eject {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
}

.rtd-btn-eject .icon-eject span:first-child {
    width: 0;
    height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-bottom: 7px solid #ddd;
}

.rtd-btn-eject .icon-eject span:last-child {
    width: 14px;
    height: 3px;
    background: #ddd;
    border-radius: 1px;
}

.rtd-sliders-row {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-bottom: 10px;
    padding: 0 4px;
}

.rtd-slider-group {
    display: flex;
    align-items: center;
    gap: 6px;
}

.rtd-slider-group label {
    font-size: 9px;
    color: var(--label-text);
    text-transform: uppercase;
    letter-spacing: 1px;
    min-width: 46px;
}

.rtd-progress-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 6px;
}

.rtd-progress-wrap label {
    font-size: 9px;
    color: var(--label-text);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.rtd-slider,
.rtd-progress-bar {
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: #222;
    border: 1px inset #111;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
}

.rtd-slider {
    width: 80px;
}

.rtd-progress-bar {
    flex: 1;
}

.rtd-slider::-webkit-slider-thumb,
.rtd-progress-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 18px;
    background: linear-gradient(to bottom, #aaa, #666);
    border: 1px solid #444;
    border-radius: 2px;
    cursor: pointer;
}

.rtd-slider::-moz-range-thumb,
.rtd-progress-bar::-moz-range-thumb {
    width: 14px;
    height: 18px;
    background: linear-gradient(to bottom, #aaa, #666);
    border: 1px solid #444;
    border-radius: 2px;
    cursor: pointer;
}

.rtd-playlist-toggle {
    display: block;
    width: 100%;
    background: linear-gradient(to bottom, #555, #444);
    border: 2px outset #666;
    border-radius: 3px;
    color: var(--label-text);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 0;
    cursor: pointer;
    margin-bottom: 6px;
}

.rtd-playlist-toggle:hover {
    background: linear-gradient(to bottom, #666, #555);
}

.rtd-playlist {
    display: none;
    max-height: 200px;
    overflow-y: auto;
    background: #111;
    border: 1px inset #000;
    border-radius: 3px;
}

.rtd-playlist.open {
    display: block;
}

.rtd-playlist ol {
    list-style: none;
    padding: 0;
    margin: 0;
}

.rtd-playlist li {
    padding: 6px 10px;
    font-size: 11px;
    color: #aaa;
    cursor: pointer;
    border-bottom: 1px solid #222;
    display: flex;
    justify-content: space-between;
}

.rtd-playlist li:hover {
    background: #1a2a10;
    color: var(--lcd-text);
}

.rtd-playlist li.active {
    background: #1a2a10;
    color: var(--lcd-text);
}

.rtd-playlist li .track-num {
    min-width: 22px;
    color: #666;
}

.rtd-playlist li .track-duration {
    color: #666;
    font-size: 10px;
}

.rtd-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 6px;
    border-top: 1px solid #555;
}

.rtd-footer-left,
.rtd-footer-right {
    font-size: 8px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.rtd-led {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #220000;
    border: 1px solid #333;
    display: inline-block;
    margin-right: 4px;
    vertical-align: middle;
}

.rtd-led.on {
    background: var(--led-green);
    box-shadow: 0 0 6px var(--led-green);
}

.rtd-deck-badge {
    display: inline-block;
    background: #d4af37;
    color: #111;
    font-size: 9px;
    font-weight: bold;
    padding: 1px 6px;
    border-radius: 2px;
    letter-spacing: 2px;
    position: absolute;
    top: 4px;
    right: 8px;
}

.rtd-screw {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #888, #333);
    border: 1px solid #222;
}

.rtd-screw::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 1px;
    background: #111;
    transform: translate(-50%, -50%) rotate(30deg);
}

.rtd-screw.tl { top: 6px; left: 6px; }
.rtd-screw.tr { top: 6px; right: 6px; }
.rtd-screw.bl { bottom: 6px; left: 6px; }
.rtd-screw.br { bottom: 6px; right: 6px; }

@media (max-width: 600px) {
    .rtd-player { padding: 14px 10px 12px; }
    .rtd-wells { flex-direction: column; }
    .rtd-btn { width: 38px; height: 30px; }
    .rtd-display-track { font-size: 11px; }
    .rtd-display-time { font-size: 14px; }
    .rtd-sliders-row { flex-direction: column; gap: 8px; }
    .rtd-brand-name { font-size: 16px; letter-spacing: 4px; }
}
</style>
</head>
<body>

<h1>Retro Tape Deck MP3 Player &mdash; WordPress Plugin Preview</h1>

<div class="rtd-player">
    <!-- Decorative screws -->
    <div class="rtd-screw tl"></div>
    <div class="rtd-screw tr"></div>
    <div class="rtd-screw bl"></div>
    <div class="rtd-screw br"></div>

    <!-- Brand -->
    <div class="rtd-brand">
        <div class="rtd-brand-name">RetroSound</div>
        <div class="rtd-brand-model">Dual Cassette Stereo System</div>
    </div>

    <!-- LCD display -->
    <div class="rtd-display">
        <span class="rtd-led"></span>
        <span class="rtd-display-track">-- NO TAPE --</span>
        <span class="rtd-display-time">0:00</span>
    </div>

    <!-- VU meters -->
    <div class="rtd-vu-container">
        <span class="rtd-vu-label">L</span>
        <div class="rtd-vu-meter rtd-vu-left">
            <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
            <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
            <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
            <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
            <div class="vu-bar"></div><div class="vu-bar"></div>
        </div>
        <span class="rtd-vu-label">R</span>
        <div class="rtd-vu-meter rtd-vu-right">
            <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
            <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
            <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
            <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
            <div class="vu-bar"></div><div class="vu-bar"></div>
        </div>
    </div>

    <!-- Dual cassette wells -->
    <div class="rtd-wells">
        <!-- Deck A -->
        <div class="rtd-well rtd-well-a">
            <span class="rtd-well-label">Deck A &mdash; Play</span>
            <span class="rtd-deck-badge">A</span>
            <div class="rtd-reels">
                <div class="rtd-reel">
                    <div class="rtd-reel-inner"></div>
                    <div class="spoke-3"></div>
                </div>
                <div class="rtd-reel">
                    <div class="rtd-reel-inner"></div>
                    <div class="spoke-3"></div>
                </div>
            </div>
            <div class="rtd-tape-strip"></div>
        </div>

        <!-- Deck B -->
        <div class="rtd-well rtd-well-b">
            <span class="rtd-well-label">Deck B &mdash; Playlist</span>
            <span class="rtd-deck-badge">B</span>
            <div class="rtd-reels">
                <div class="rtd-reel">
                    <div class="rtd-reel-inner"></div>
                    <div class="spoke-3"></div>
                </div>
                <div class="rtd-reel">
                    <div class="rtd-reel-inner"></div>
                    <div class="spoke-3"></div>
                </div>
            </div>
            <div class="rtd-tape-strip"></div>
        </div>
    </div>

    <!-- Transport controls -->
    <div class="rtd-controls">
        <button class="rtd-btn rtd-btn-prev" title="Previous Track">
            <div class="icon-prev"><span></span><span></span></div>
            <span class="rtd-btn-label">Prev</span>
        </button>
        <button class="rtd-btn rtd-btn-rew" title="Rewind">
            <div class="icon-rew"><span></span><span></span></div>
            <span class="rtd-btn-label">Rew</span>
        </button>
        <button class="rtd-btn rtd-btn-play" title="Play">
            <div class="icon-play"></div>
            <span class="rtd-btn-label">Play</span>
        </button>
        <button class="rtd-btn rtd-btn-pause" title="Pause">
            <div class="icon-pause"><span></span><span></span></div>
            <span class="rtd-btn-label">Pause</span>
        </button>
        <button class="rtd-btn rtd-btn-stop" title="Stop">
            <div class="icon-stop"></div>
            <span class="rtd-btn-label">Stop</span>
        </button>
        <button class="rtd-btn rtd-btn-ff" title="Fast Forward">
            <div class="icon-ff"><span></span><span></span></div>
            <span class="rtd-btn-label">F.Fwd</span>
        </button>
        <button class="rtd-btn rtd-btn-next" title="Next Track">
            <div class="icon-next"><span></span><span></span></div>
            <span class="rtd-btn-label">Next</span>
        </button>
        <button class="rtd-btn rtd-btn-eject" title="Eject">
            <div class="icon-eject"><span></span><span></span></div>
            <span class="rtd-btn-label">Eject</span>
        </button>
    </div>

    <!-- Volume & progress -->
    <div class="rtd-sliders-row">
        <div class="rtd-slider-group">
            <label>Volume</label>
            <input type="range" class="rtd-slider rtd-volume" min="0" max="100" value="75" />
        </div>
        <div class="rtd-progress-wrap">
            <label>Position</label>
            <input type="range" class="rtd-progress-bar" min="0" max="100" value="0" />
        </div>
    </div>

    <!-- Playlist drawer -->
    <button class="rtd-playlist-toggle">&#9654; Playlist (Deck B)</button>
    <div class="rtd-playlist">
        <ol></ol>
    </div>

    <!-- Footer -->
    <div class="rtd-footer">
        <span class="rtd-footer-left">Auto Reverse &bull; Dolby B NR</span>
        <span class="rtd-footer-right">Stereo &bull; CrO&#8322; / Metal</span>
    </div>

    <!-- Demo tracks – using free public-domain samples -->
    <script type="application/json" class="rtd-track-data">[
        {"title": "Funky Chunk (Demo)", "url": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
        {"title": "Retro Groove (Demo)", "url": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"},
        {"title": "Chill Tape (Demo)", "url": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"},
        {"title": "Night Drive (Demo)", "url": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"},
        {"title": "Synth Dreams (Demo)", "url": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3"}
    ]</script>
</div>

<script>
(function () {
    "use strict";

    function formatTime(sec) {
        if (!isFinite(sec) || sec < 0) return "0:00";
        var m = Math.floor(sec / 60);
        var s = Math.floor(sec % 60);
        return m + ":" + (s < 10 ? "0" : "") + s;
    }

    document.addEventListener("DOMContentLoaded", function () {
        var players = document.querySelectorAll(".rtd-player");
        players.forEach(initPlayer);
    });

    function initPlayer(root) {
        var dataEl = root.querySelector(".rtd-track-data");
        if (!dataEl) return;
        var tracks = [];
        try { tracks = JSON.parse(dataEl.textContent); } catch (e) { return; }
        if (!tracks.length) return;

        var currentIndex = 0;
        var audio = new Audio();
        audio.preload = "metadata";
        audio.volume = 0.75;

        var displayTrack = root.querySelector(".rtd-display-track");
        var displayTime = root.querySelector(".rtd-display-time");
        var progressBar = root.querySelector(".rtd-progress-bar");
        var volumeSlider = root.querySelector(".rtd-volume");
        var btnPlay = root.querySelector(".rtd-btn-play");
        var btnPause = root.querySelector(".rtd-btn-pause");
        var btnStop = root.querySelector(".rtd-btn-stop");
        var btnRew = root.querySelector(".rtd-btn-rew");
        var btnFf = root.querySelector(".rtd-btn-ff");
        var btnPrev = root.querySelector(".rtd-btn-prev");
        var btnNext = root.querySelector(".rtd-btn-next");
        var btnEject = root.querySelector(".rtd-btn-eject");
        var reelsA = root.querySelectorAll(".rtd-well-a .rtd-reel");
        var reelsB = root.querySelectorAll(".rtd-well-b .rtd-reel");
        var led = root.querySelector(".rtd-led");
        var playlistToggle = root.querySelector(".rtd-playlist-toggle");
        var playlistEl = root.querySelector(".rtd-playlist");
        var vuBarsL = root.querySelectorAll(".rtd-vu-left .vu-bar");
        var vuBarsR = root.querySelectorAll(".rtd-vu-right .vu-bar");

        var audioCtx, splitter, analyserL, analyserR, sourceNode;

        function initAudioContext() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                sourceNode = audioCtx.createMediaElementSource(audio);
                splitter = audioCtx.createChannelSplitter(2);
                analyserL = audioCtx.createAnalyser();
                analyserR = audioCtx.createAnalyser();
                analyserL.fftSize = 64;
                analyserR.fftSize = 64;
                sourceNode.connect(splitter);
                splitter.connect(analyserL, 0);
                splitter.connect(analyserR, 1);
                sourceNode.connect(audioCtx.destination);
            } catch (e) { audioCtx = null; }
        }

        function animateVU() {
            if (!audioCtx || audio.paused) { resetVU(); return; }
            var dataL = new Uint8Array(analyserL.frequencyBinCount);
            var dataR = new Uint8Array(analyserR.frequencyBinCount);
            analyserL.getByteFrequencyData(dataL);
            analyserR.getByteFrequencyData(dataR);
            updateVUBars(vuBarsL, dataL);
            updateVUBars(vuBarsR, dataR);
            requestAnimationFrame(animateVU);
        }

        function updateVUBars(bars, data) {
            for (var i = 0; i < bars.length; i++) {
                var idx = Math.floor((i / bars.length) * data.length);
                var h = Math.max(2, (data[idx] / 255) * 22);
                bars[i].style.height = h + "px";
            }
        }

        function resetVU() {
            [vuBarsL, vuBarsR].forEach(function (bars) {
                for (var i = 0; i < bars.length; i++) bars[i].style.height = "2px";
            });
        }

        function loadTrack(index) {
            if (index < 0 || index >= tracks.length) return;
            currentIndex = index;
            audio.src = tracks[index].url;
            displayTrack.textContent = tracks[index].title;
            displayTime.textContent = "0:00";
            if (progressBar) progressBar.value = 0;
            highlightPlaylistItem();
        }

        function play() {
            if (!audio.src) loadTrack(0);
            initAudioContext();
            if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
            audio.play();
            setReelsSpinning(true);
            if (led) led.classList.add("on");
            if (btnPlay) btnPlay.classList.add("active");
            animateVU();
        }

        function pause() {
            audio.pause();
            setReelsSpinning(false);
            if (btnPlay) btnPlay.classList.remove("active");
        }

        function stop() {
            audio.pause();
            audio.currentTime = 0;
            setReelsSpinning(false);
            if (led) led.classList.remove("on");
            if (btnPlay) btnPlay.classList.remove("active");
            displayTime.textContent = "0:00";
            if (progressBar) progressBar.value = 0;
            resetVU();
        }

        function prevTrack() {
            var idx = currentIndex - 1;
            if (idx < 0) idx = tracks.length - 1;
            var wasPlaying = !audio.paused;
            loadTrack(idx);
            if (wasPlaying) play();
        }

        function nextTrack() {
            var idx = currentIndex + 1;
            if (idx >= tracks.length) idx = 0;
            var wasPlaying = !audio.paused;
            loadTrack(idx);
            if (wasPlaying) play();
        }

        function eject() {
            stop();
            displayTrack.textContent = "-- NO TAPE --";
            audio.src = "";
        }

        function setReelsSpinning(spinning) {
            [].concat(
                Array.prototype.slice.call(reelsA),
                Array.prototype.slice.call(reelsB)
            ).forEach(function (r) {
                r.classList.toggle("spinning", spinning);
            });
        }

        function buildPlaylist() {
            if (!playlistEl) return;
            var ol = playlistEl.querySelector("ol");
            if (!ol) return;
            ol.innerHTML = "";
            tracks.forEach(function (t, i) {
                var li = document.createElement("li");
                li.innerHTML =
                    '<span class="track-num">' + (i + 1) + ".</span> " +
                    '<span class="track-title">' + escapeHtml(t.title) + "</span>" +
                    '<span class="track-duration"></span>';
                li.addEventListener("click", function () { loadTrack(i); play(); });
                ol.appendChild(li);
            });
            highlightPlaylistItem();
        }

        function highlightPlaylistItem() {
            if (!playlistEl) return;
            playlistEl.querySelectorAll("li").forEach(function (li, i) {
                li.classList.toggle("active", i === currentIndex);
            });
        }

        function escapeHtml(str) {
            var div = document.createElement("div");
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        if (btnPlay) btnPlay.addEventListener("click", play);
        if (btnPause) btnPause.addEventListener("click", pause);
        if (btnStop) btnStop.addEventListener("click", stop);
        if (btnRew) btnRew.addEventListener("click", function () {
            audio.currentTime = Math.max(0, audio.currentTime - 10);
        });
        if (btnFf) btnFf.addEventListener("click", function () {
            audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10);
        });
        if (btnPrev) btnPrev.addEventListener("click", prevTrack);
        if (btnNext) btnNext.addEventListener("click", nextTrack);
        if (btnEject) btnEject.addEventListener("click", eject);

        if (volumeSlider) {
            volumeSlider.addEventListener("input", function () { audio.volume = this.value / 100; });
        }
        if (progressBar) {
            progressBar.addEventListener("input", function () {
                if (audio.duration) audio.currentTime = (this.value / 100) * audio.duration;
            });
        }
        if (playlistToggle && playlistEl) {
            playlistToggle.addEventListener("click", function () {
                playlistEl.classList.toggle("open");
            });
        }

        audio.addEventListener("timeupdate", function () {
            displayTime.textContent = formatTime(audio.currentTime);
            if (progressBar && audio.duration)
                progressBar.value = (audio.currentTime / audio.duration) * 100;
        });
        audio.addEventListener("ended", nextTrack);
        audio.addEventListener("loadedmetadata", function () {
            if (playlistEl) {
                var items = playlistEl.querySelectorAll("li");
                if (items[currentIndex]) {
                    var dur = items[currentIndex].querySelector(".track-duration");
                    if (dur) dur.textContent = formatTime(audio.duration);
                }
            }
        });

        loadTrack(0);
        buildPlaylist();
    }
})();
</script>

</body>
</html>
